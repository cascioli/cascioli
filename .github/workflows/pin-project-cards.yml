name: Generate Pinned Project Cards

on:
  schedule:
    - cron: '15 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-pinned:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Pinned Projects SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: generated/pinned-projects.svg
          base: ""
          plugin_repositories: yes
          plugin_repositories_featured: simone-cascioli/IL_TUO_PROGETTO_PREFERITO
          config_timezone: Europe/Rome
          output_action: none # Forzo l'azione a non fare il push da dentro Docker

      - name: Commit and Push Pinned SVG
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated/pinned-projects.svg
          git diff-index --quiet HEAD || git commit -m "Update pinned projects card"
          git push
