name: Generate Pinned Project Cards

on:
  schedule:
    - cron: '15 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-pinned:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Pinned Projects SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: generated/pinned-projects.svg
          base: ""
          plugin_repositories: yes
          plugin_repositories_featured: cascioli/flutter-claude-pro-starter
          config_timezone: Europe/Rome
