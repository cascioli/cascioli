name: Generate Pinned Project Cards

on:
  schedule:
    - cron: '15 0 * * *' # Gira ogni giorno a mezzanotte e un quarto
  workflow_dispatch:

jobs:
  generate-pinned:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Pinned Projects SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: generated/pinned-projects.svg
          base: ""
          plugin_repositories: yes
          plugin_repositories_featured: cascioli/flutter-claude-pro-starter
          config_timezone: Europe/Rome

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated/
          git diff-index --quiet HEAD || git commit -m "Update pinned projects card"
          git push
