name: Generate GitHub Readme Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure generated directory exists
        run: mkdir -p generated

      # Usiamo l'azione nativa che non gira in Docker e scrive direttamente nel workspace
      - name: Metrics Report
        uses: lowlighter/metrics@release/v3.34
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: generated/github-stats.svg
          base: header, activity, community, repositories
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_details: bytes-size, percentage
          config_timezone: Europe/Rome
          # Forza l'azione a depositare il file nel workspace condiviso di GitHub Actions
          output_action: github-deploy-action
          committer_branch: main
