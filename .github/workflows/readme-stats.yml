name: Generate GitHub Readme Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Stats Cards
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: generated/github-stats.svg
          base: header, activity, community, repositories
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_details: bytes-size, percentage
          config_timezone: Europe/Rome
          output_action: none # Forzo l'azione a non fare il push da dentro Docker

      - name: Commit and Push SVG
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated/github-stats.svg
          git diff-index --quiet HEAD || git commit -m "Update GitHub profile stats"
          git push
